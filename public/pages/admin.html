<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Mercx Talents</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="/js/app.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070e;--bg-card:#0f0f1a;--bg-ele:#161625;--bg-inp:#1b1b2a;
  --border:rgba(255,255,255,.07);--border-h:rgba(239,68,68,.4);
  --p:#6c47ff;--pa:#ef4444;--pa-d:#cc2222;--pa-l:rgba(239,68,68,.12);
  --accent:#00d4aa;--warn:#f59e0b;--danger:#ef4444;--success:#10b981;
  --t1:#f0f0ff;--t2:#8888aa;--t3:#44445a;
  --r:12px;--rf:9999px;--font-h:'Syne',sans-serif;--font:'DM Sans',sans-serif;
  --glow-a:0 0 40px rgba(239,68,68,.15);--tr:0.18s cubic-bezier(.4,0,.2,1);
}
body{font-family:var(--font);background:var(--bg);color:var(--t1);display:flex;height:100vh;overflow:hidden}

.sidebar{width:240px;flex-shrink:0;background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow-y:auto}
.sb-logo{padding:22px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo-text{font-family:var(--font-h);font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--pa),#ff8844);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sb-logo span{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:var(--pa);font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:var(--rf)}
.sb-admin{padding:14px 20px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--border)}
.sb-admin img{width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid var(--pa)}
.sb-admin-name{font-weight:600;font-size:.88rem}
.sb-admin-badge{font-size:.7rem;background:var(--pa-l);color:var(--pa);padding:2px 7px;border-radius:var(--rf);font-weight:600;margin-top:2px;display:inline-block}
.sb-section{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);padding:12px 20px 5px}
.sb-item{display:flex;align-items:center;gap:12px;padding:10px 20px;cursor:pointer;transition:var(--tr);color:var(--t2);font-size:.87rem;font-weight:500;border-left:3px solid transparent;text-decoration:none}
.sb-item:hover{color:var(--t1);background:var(--bg-ele)}
.sb-item.active{color:var(--pa);background:var(--pa-l);border-left-color:var(--pa)}
.sb-item span:first-child{font-size:1rem;width:20px;text-align:center}
.sb-badge{margin-left:auto;background:var(--pa);color:white;font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:var(--rf)}
.sb-bottom{padding:16px 20px;border-top:1px solid var(--border);margin-top:auto}
.sb-back{display:flex;align-items:center;gap:8px;color:var(--t2);font-size:.85rem;cursor:pointer;padding:6px 0;text-decoration:none;transition:var(--tr)}
.sb-back:hover{color:var(--t1)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:62px;border-bottom:1px solid var(--border);background:var(--bg-card);display:flex;align-items:center;justify-content:space-between;padding:0 28px;flex-shrink:0}
.topbar-title{font-family:var(--font-h);font-size:1.05rem;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:10px}
.admin-live{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--success);background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);padding:5px 12px;border-radius:var(--rf)}
.admin-live span{width:7px;height:7px;background:var(--success);border-radius:50%;animation:pulse 2s infinite}
.content{flex:1;overflow-y:auto;padding:28px}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:18px;transition:var(--tr)}
.stat-card:hover{border-color:var(--border-h);box-shadow:var(--glow-a)}
.stat-icon{font-size:1.4rem;margin-bottom:10px}
.stat-label{font-size:.75rem;color:var(--t2);margin-bottom:6px;font-weight:500}
.stat-val{font-family:var(--font-h);font-size:1.7rem;font-weight:700}
.stat-delta{font-size:.72rem;margin-top:3px}

/* TABLE */
.table-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px}
.table-head{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.table-head h4{font-size:.93rem;font-weight:600}
.search-inp{background:var(--bg-inp);border:1px solid var(--border);border-radius:var(--rf);padding:7px 14px;color:var(--t1);font-size:.83rem;outline:none;font-family:var(--font);width:200px}
.search-inp:focus{border-color:var(--pa)}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 16px;text-align:left;font-size:.73rem;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;background:var(--bg-ele);border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:var(--tr)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg-ele)}
tbody td{padding:12px 16px;font-size:.85rem;color:var(--t2)}
tbody td:first-child{color:var(--t1);font-weight:500}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--rf);font-size:.845rem;font-weight:600;border:none;cursor:pointer;transition:var(--tr);font-family:var(--font)}
.btn-p{background:linear-gradient(135deg,var(--p),#5533ee);color:white}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 5px 20px rgba(108,71,255,.4)}
.btn-admin{background:linear-gradient(135deg,var(--pa),var(--pa-d));color:white;box-shadow:0 3px 14px rgba(239,68,68,.28)}
.btn-admin:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(239,68,68,.45)}
.btn-g{background:var(--bg-ele);border:1px solid var(--border);color:var(--t2)}
.btn-g:hover{border-color:var(--p);color:var(--p)}
.btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--danger)}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--success)}
.btn-success:hover{background:rgba(16,185,129,.2)}
.btn-sm{padding:5px 12px;font-size:.78rem}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

/* FORMS */
.fg{margin-bottom:16px}
.fg label{display:block;font-size:.8rem;font-weight:500;color:var(--t2);margin-bottom:7px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 14px;background:var(--bg-inp);border:1px solid var(--border);border-radius:var(--r);color:var(--t1);font-size:.9rem;font-family:var(--font);outline:none;transition:var(--tr)}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--pa);box-shadow:0 0 0 3px rgba(239,68,68,.1)}
.fg select{appearance:none;cursor:pointer}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* REVENUE CHART */
.rev-chart{display:flex;align-items:flex-end;gap:8px;height:140px;padding:10px 0}
.rev-bar{flex:1;background:linear-gradient(0deg,var(--p),rgba(108,71,255,.3));border-radius:6px 6px 0 0;min-height:4px;transition:var(--tr);cursor:pointer;position:relative}
.rev-bar:hover{background:linear-gradient(0deg,var(--pa),rgba(239,68,68,.4))}
.rev-bar-label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:.65rem;color:var(--t3);white-space:nowrap}
.rev-bar-val{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:.65rem;color:var(--t1);white-space:nowrap;display:none}
.rev-bar:hover .rev-bar-val{display:block}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--t3)}
.empty-icon{font-size:2.5rem;margin-bottom:12px}

/* TOGGLE */
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--border)}
.toggle-row:last-child{border-bottom:none}
.toggle-info strong{display:block;font-size:.88rem;margin-bottom:2px}
.toggle-info span{font-size:.78rem;color:var(--t3)}
.tog{position:relative;display:inline-block;width:44px;height:24px;cursor:pointer}
.tog input{opacity:0;width:0;height:0}
.tog-track{position:absolute;inset:0;border-radius:12px;transition:.3s}
.tog input:checked~.tog-track{background:var(--success)}
.tog input:not(:checked)~.tog-track{background:var(--bg-ele);border:1px solid var(--border)}
.tog-thumb{position:absolute;top:3px;width:18px;height:18px;background:white;border-radius:50%;transition:.3s}
.tog input:checked~.tog-thumb{left:23px}
.tog input:not(:checked)~.tog-thumb{left:3px}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media(max-width:1100px){.stat-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){.sidebar{display:none}.stat-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sb-logo">
    <div>
      <div class="sb-logo-text">Mercx</div>
    </div>
    <span>ADMIN</span>
  </div>
  <div class="sb-admin">
    <img id="adm-ava" src="https://ui-avatars.com/api/?name=Admin&background=ef4444&color=fff" alt="admin">
    <div><div class="sb-admin-name" id="adm-name">Admin</div><div class="sb-admin-badge">🔴 Administrator</div></div>
  </div>
  <nav style="flex:1;padding:10px 0">
    <div class="sb-section">Dashboard</div>
    <a class="sb-item active" onclick="showPage('overview')"><span>📊</span><span>Overview</span></a>
    <a class="sb-item" onclick="showPage('revenue')"><span>💵</span><span>Revenue</span></a>
    <div class="sb-section">Manage</div>
    <a class="sb-item" onclick="showPage('users')"><span>👥</span><span>Users</span><span class="sb-badge" id="badge-users">0</span></a>
    <a class="sb-item" onclick="showPage('talents')"><span>🎯</span><span>Listings</span></a>
    <a class="sb-item" onclick="showPage('orders')"><span>📦</span><span>Orders</span></a>
    <a class="sb-item" onclick="showPage('disputes')"><span>⚠️</span><span>Disputes</span><span class="sb-badge" id="badge-disputes" style="display:none">0</span></a>
    <a class="sb-item" onclick="showPage('payments')"><span>💳</span><span>Payments</span></a>
    <div class="sb-section">Platform</div>
    <a class="sb-item" onclick="showPage('settings')"><span>⚙️</span><span>Settings</span></a>
    <a class="sb-item" onclick="showPage('broadcast')"><span>📢</span><span>Broadcast</span></a>
  </nav>
  <div class="sb-bottom">
    <a href="/pages/dashboard.html" class="sb-back">← User Dashboard</a>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="topbar-title" id="page-title">Overview</div>
    <div class="topbar-right">
      <div class="admin-live"><span></span> Live</div>
      <div style="color:var(--t2);font-size:.82rem" id="adm-email"></div>
    </div>
  </div>
  <div class="content" id="main-content"></div>
</main>

<script>
const user = requireAuth('admin');
if (!user) throw new Error();

document.getElementById('adm-name').textContent = user.name;
document.getElementById('adm-email').textContent = user.email;
document.getElementById('adm-ava').src = user.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=ef4444&color=fff`;

function showPage(page) {
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.toggle('active',el.getAttribute('onclick')?.includes(`'${page}'`)));
  document.getElementById('page-title').textContent = {
    overview:'Overview',revenue:'Revenue & Earnings',users:'User Management',
    talents:'Talent Listings',orders:'Order Management',disputes:'Dispute Center',
    payments:'Payments',settings:'Platform Settings',broadcast:'Broadcast Message'
  }[page]||page;
  const c = document.getElementById('main-content');
  c.innerHTML = `<div style="text-align:center;padding:60px"><div class="spin" style="width:30px;height:30px;border:3px solid rgba(239,68,68,.2);border-top-color:var(--pa);border-radius:50%;margin:0 auto 12px;display:inline-block"></div><p style="color:var(--t2)">Loading...</p></div>`;
  ({overview:renderOverview,revenue:renderRevenue,users:renderUsers,talents:renderTalents,
    orders:renderOrders,disputes:renderDisputes,payments:renderPayments,
    settings:renderSettings,broadcast:renderBroadcast}[page]||renderOverview)();
}

// ─── OVERVIEW ───────────────────────────────────────────────────
async function renderOverview() {
  const r = await API.get('/admin/stats');
  const s = r.data || {};
  document.getElementById('main-content').innerHTML = `
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-icon">👥</div>
      <div class="stat-label">Total Users</div>
      <div class="stat-val">${s.totalUsers||0}</div>
      <div class="stat-delta" style="color:var(--success)">▲ ${s.newUsersToday||0} today</div></div>
    <div class="stat-card"><div class="stat-icon">📦</div>
      <div class="stat-label">Total Orders</div>
      <div class="stat-val">${s.totalOrders||0}</div>
      <div class="stat-delta" style="color:var(--success)">▲ ${s.newOrdersToday||0} today</div></div>
    <div class="stat-card"><div class="stat-icon">💰</div>
      <div class="stat-label">Platform Revenue</div>
      <div class="stat-val" style="color:var(--success)">$${fmt(s.platformRevenue)}</div>
      <div class="stat-delta" style="color:var(--accent)">10% fee</div></div>
    <div class="stat-card"><div class="stat-icon">⚠️</div>
      <div class="stat-label">Open Disputes</div>
      <div class="stat-val" style="color:${(s.openDisputes||0)>0?'var(--danger)':'var(--t1)'}">${s.openDisputes||0}</div>
      <div class="stat-delta" style="color:var(--t3)">Need review</div></div>
    <div class="stat-card"><div class="stat-icon">🎯</div>
      <div class="stat-label">Active Listings</div>
      <div class="stat-val">${s.activeListings||0}</div>
      <div class="stat-delta" style="color:var(--t3)">${s.totalListings||0} total</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1.6fr 1fr;gap:20px;margin-bottom:20px">
    <div class="table-wrap" style="padding:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h4>Revenue (Last 7 Days)</h4>
        <span style="font-size:.8rem;color:var(--t3)">Hover bars for details</span>
      </div>
      <div class="rev-chart" id="rev-chart">
        ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((day,i)=>{
          const h = 20+Math.random()*80;
          const val = (Math.random()*500).toFixed(0);
          return `<div class="rev-bar" style="height:${h}%">
            <span class="rev-bar-label">${day}</span>
            <span class="rev-bar-val">$${val}</span>
          </div>`;
        }).join('')}
      </div>
      <div style="margin-top:28px;font-size:.75rem;color:var(--t3)">* Live data coming soon</div>
    </div>
    <div class="table-wrap" style="padding:20px">
      <h4 style="margin-bottom:16px">Quick Actions</h4>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button class="btn btn-admin btn-full" onclick="showPage('disputes')">⚠️ Review Disputes (${s.openDisputes||0})</button>
        <button class="btn btn-p btn-full" onclick="showPage('users')">👥 Manage Users</button>
        <button class="btn btn-g btn-full" onclick="showPage('broadcast')">📢 Send Broadcast</button>
        <button class="btn btn-g btn-full" onclick="showPage('settings')">⚙️ Platform Settings</button>
      </div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
    <div class="table-wrap">
      <div class="table-head"><h4>Recent Users</h4><button class="btn btn-g btn-sm" onclick="showPage('users')">All →</button></div>
      <div id="recent-users-list"><div class="empty"><div class="empty-icon">👥</div><h4>Loading...</h4></div></div>
    </div>
    <div class="table-wrap">
      <div class="table-head"><h4>Recent Orders</h4><button class="btn btn-g btn-sm" onclick="showPage('orders')">All →</button></div>
      <div id="recent-orders-list"><div class="empty"><div class="empty-icon">📦</div><h4>Loading...</h4></div></div>
    </div>
  </div>`;

  // Load recent data
  const [usersRes, ordersRes] = await Promise.all([
    API.get('/admin/users?limit=5'),
    API.get('/admin/orders?limit=5')
  ]);

  const users2 = usersRes.data||[];
  document.getElementById('recent-users-list').innerHTML = users2.length===0
    ? '<div class="empty"><h4>No users yet</h4></div>'
    : users2.map(u=>`
      <div style="display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border)">
        <img src="${u.avatar||`https://ui-avatars.com/api/?name=${encodeURIComponent(u.name)}&background=6c47ff&color=fff`}" style="width:32px;height:32px;border-radius:50%;object-fit:cover">
        <div style="flex:1;min-width:0">
          <div style="font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${u.name}</div>
          <div style="font-size:.73rem;color:var(--t3)">${u.role} • ${fmtDate(u.createdAt)}</div>
        </div>
        ${statusBadge(u.isBanned?'banned':u.role)}
      </div>`).join('');

  const orders2 = ordersRes.data||[];
  document.getElementById('recent-orders-list').innerHTML = orders2.length===0
    ? '<div class="empty"><h4>No orders yet</h4></div>'
    : `<table style="width:100%"><thead><tr><th>ID</th><th>Status</th><th>Amount</th></tr></thead><tbody>
      ${orders2.map(o=>`<tr>
        <td>#${o._id?.slice(-6)}</td>
        <td>${statusBadge(o.status)}</td>
        <td style="color:var(--accent);font-weight:600">$${fmt(o.price)}</td>
      </tr>`).join('')}
      </tbody></table>`;
}

// ─── USERS ─────────────────────────────────────────────────────
async function renderUsers() {
  const res = await API.get('/admin/users?limit=50');
  const users2 = res.data||[];
  document.getElementById('badge-users').textContent = users2.length;
  document.getElementById('main-content').innerHTML = `
  <div class="table-wrap">
    <div class="table-head">
      <h4>All Users (${users2.length})</h4>
      <div style="display:flex;gap:8px">
        <input class="search-inp" placeholder="🔍 Search users..." oninput="filterTable(this,'users-tbody')">
        <select class="search-inp" style="width:140px" onchange="filterUsers(this.value)">
          <option value="">All Roles</option>
          <option value="freelancer">Freelancers</option>
          <option value="client">Clients</option>
          <option value="admin">Admins</option>
        </select>
      </div>
    </div>
    ${users2.length===0?`<div class="empty"><div class="empty-icon">👥</div><h4>No users found</h4></div>`:
    `<table><thead><tr><th>User</th><th>Email</th><th>Role</th><th>Joined</th><th>Orders</th><th>Rating</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody id="users-tbody">
      ${users2.map(u=>`
        <tr data-role="${u.role}">
          <td><div style="display:flex;align-items:center;gap:9px">
            <img src="${u.avatar||`https://ui-avatars.com/api/?name=${encodeURIComponent(u.name)}&background=6c47ff&color=fff`}" style="width:30px;height:30px;border-radius:50%;object-fit:cover">
            ${u.name}
          </div></td>
          <td>${u.email}</td>
          <td>${statusBadge(u.role)}</td>
          <td>${fmtDate(u.createdAt)}</td>
          <td>${u.totalOrders||0}</td>
          <td style="color:var(--warn)">⭐ ${(u.averageRating||0).toFixed(1)}</td>
          <td>${statusBadge(u.isBanned?'banned':'active')}</td>
          <td><div style="display:flex;gap:5px;flex-wrap:wrap">
            ${u.isBanned
              ? `<button class="btn btn-success btn-sm" onclick="unbanUser('${u._id}','${u.name}')">✅ Unban</button>`
              : `<button class="btn btn-danger btn-sm" onclick="banUser('${u._id}','${u.name}')">🚫 Ban</button>`}
            ${u.role!=='admin'?`<button class="btn btn-g btn-sm" onclick="makeAdmin('${u._id}','${u.name}')">⬆️ Admin</button>`:''}
            <button class="btn btn-g btn-sm" onclick="viewUser('${u._id}')">👁</button>
          </div></td>
        </tr>`).join('')}
    </tbody></table>`}
  </div>`;
}

window.filterTable = function(inp, tbodyId) {
  const q = inp.value.toLowerCase();
  document.querySelectorAll(`#${tbodyId} tr`).forEach(row=>{
    row.style.display = row.textContent.toLowerCase().includes(q)?'':'none';
  });
};

window.filterUsers = function(role) {
  document.querySelectorAll('#users-tbody tr').forEach(row=>{
    row.style.display = (!role || row.dataset.role===role) ? '' : 'none';
  });
};

window.banUser = function(id, name) {
  showModal('Ban User', `<p style="color:var(--t2)">Ban <strong style="color:var(--t1)">${name}</strong>? They will lose access immediately.</p>
    <div class="fg" style="margin-top:14px"><label>Reason</label><input id="ban-reason" placeholder="Reason for ban..."></div>`, async()=>{
    const reason = document.getElementById('ban-reason').value;
    const r = await API.put(`/admin/users/${id}/ban`, {reason});

};

    toast(r.success?`${name} has been unbanned`:'Failed', r.success?'success':'error');
    if(r.success) renderUsers();
  });
};

window.makeAdmin = function(id, name) {
  showModal('Promote to Admin',`<p style="color:var(--t2)">Give <strong>${name}</strong> admin privileges? They will have full platform access.</p>`,async()=>{
    const r = await API.put(`/admin/users/${id}/role`, {role:'admin'});

window.viewUser = async function(id) {
  const r = await API.get(`/admin/users/${id}`);
  const u = r.data||{};
  showModal(`User: ${u.name}`, `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
      <img src="${u.avatar||`https://ui-avatars.com/api/?name=${encodeURIComponent(u.name||'U')}&background=6c47ff&color=fff`}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid var(--p)">
      <div><div style="font-weight:700;font-size:1.1rem">${u.name}</div><div style="color:var(--t2);font-size:.85rem">${u.email}</div></div>

         ['Joined',fmtDate(u.createdAt)],['Balance','$'+fmt(u.wallet?.balance)],
         ['Total Earned','$'+fmt(u.wallet?.total_earned)],['Total Orders',u.totalOrders||0],
         ['Rating','⭐ '+(u.averageRating||0).toFixed(1)+` (${u.totalReviews||0} reviews)`]
      ].map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="color:var(--t2)">${k}</span><span>${v}</span></div>`).join('')}
    </div>`);
};

// ─── TALENT LISTINGS ────────────────────────────────────────────
async function renderTalents() {
  const res = await API.get('/admin/talents?limit=50');
  const talents = res.data||[];
  document.getElementById('main-content').innerHTML = `
  <div class="table-wrap">
    <div class="table-head"><h4>All Listings (${talents.length})</h4>
      <input class="search-inp" placeholder="🔍 Search..." oninput="filterTable(this,'tal-tbody')">
    </div>
    ${talents.length===0?`<div class="empty"><div class="empty-icon">🎯</div><h4>No listings</h4></div>`:
    `<table><thead><tr><th>Title</th><th>Freelancer</th><th>Category</th><th>Price</th><th>Rating</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody id="tal-tbody">
      ${talents.map(t=>`<tr>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</td>
        <td>${t.user?.name||'—'}</td>
        <td>${t.category||'—'}</td>
        <td style="color:var(--accent)">$${fmt(t.pricing?.basic?.price||0)}</td>
        <td style="color:var(--warn)">⭐ ${(t.averageRating||0).toFixed(1)}</td>
        <td>${statusBadge(t.isActive?'active':'pending')}</td>
        <td><div style="display:flex;gap:5px">
          <button class="btn btn-p btn-sm" onclick="featureTalent('${t._id}')">⭐ Feature</button>
          <button class="btn btn-danger btn-sm" onclick="removeTalent('${t._id}')">Remove</button>
        </div></td>
      </tr>`).join('')}
    </tbody></table>`}

window.featureTalent = async function(id) {
  const r = await API.put(`/admin/talents/${id}/feature`, {});
  toast(r.success?'Listing featured!':'Failed', r.success?'success':'error');
};
window.removeTalent = function(id) {
  showModal('Remove Listing','<p style="color:var(--t2)">Remove this listing? Freelancer will be notified.</p>',async()=>{
    const r = await API.delete(`/admin/talents/${id}`);
    toast(r.success?'Listing removed':'Failed', r.success?'success':'error');
    if(r.success) renderTalents();
  });
};

// ─── ORDERS ─────────────────────────────────────────────────────
async function renderOrders() {
  const res = await API.get('/admin/orders?limit=100');
  const orders = res.data||[];
  document.getElementById('main-content').innerHTML = `
  <div class="table-wrap">
    <div class="table-head"><h4>All Orders (${orders.length})</h4>
      <div style="display:flex;gap:8px">
        <input class="search-inp" placeholder="🔍 Search..." oninput="filterTable(this,'ord-tbody')">
        <select class="search-inp" style="width:160px" onchange="filterOrders(this.value)">
          <option value="">All Status</option>
          <option value="pending">Pending</option>
          <option value="in_progress">In Progress</option>
          <option value="completed">Completed</option>
          <option value="disputed">Disputed</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
    </div>
    ${orders.length===0?`<div class="empty"><div class="empty-icon">📦</div><h4>No orders</h4></div>`:
    `<table><thead><tr><th>ID</th><th>Service</th><th>Client</th><th>Freelancer</th><th>Status</th><th>Escrow</th><th>Amount</th><th>Date</th><th>Actions</th></tr></thead>
    <tbody id="ord-tbody">
      ${orders.map(o=>`<tr data-status="${o.status}">
        <td>#${o._id?.slice(-6)}</td>
        <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.talent?.title||'—'}</td>
        <td>${o.client?.name||'—'}</td>
        <td>${o.freelancer?.name||'—'}</td>
        <td>${statusBadge(o.status)}</td>
        <td>${statusBadge(o.escrow?.status||'pending')}</td>
        <td style="color:var(--accent);font-weight:600">$${fmt(o.price)}</td>
        <td>${fmtDate(o.createdAt)}</td>
        <td>
          ${o.status==='disputed'?`<button class="btn btn-admin btn-sm" onclick="resolveDispute('${o._id}')">⚠️ Resolve</button>`:''}
          ${o.escrow?.status==='funded'?`<button class="btn btn-danger btn-sm" onclick="adminRefund('${o._id}')">↩️ Refund</button>`:''}
        </td>
      </tr>`).join('')}
    </tbody></table>`}
  </div>`;
}

window.filterOrders = function(status) {
  document.querySelectorAll('#ord-tbody tr').forEach(row=>{
    row.style.display = (!status||row.dataset.status===status)?'':'none';
  });
};

// ─── DISPUTES ───────────────────────────────────────────────────
async function renderDisputes() {
  const res = await API.get('/admin/disputes');
  const disputes = res.data||[];
  const open = disputes.filter(d=>d.escrow?.status==='disputed');
  document.getElementById('badge-disputes').textContent = open.length;
  document.getElementById('badge-disputes').style.display = open.length>0?'':'none';

  document.getElementById('main-content').innerHTML = `
  ${open.length>0?`<div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:var(--r);padding:14px 20px;margin-bottom:18px;font-size:.88rem;color:var(--danger)">
    ⚠️ <strong>${open.length} dispute${open.length>1?'s':''}</strong> require your attention</div>`:''}
  <div class="table-wrap">
    <div class="table-head"><h4>Dispute Center (${disputes.length})</h4></div>
    ${disputes.length===0?`<div class="empty"><div class="empty-icon">✅</div><h4>No disputes!</h4><p>All orders are running smoothly</p></div>`:
    disputes.map(d=>`
      <div style="padding:20px;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div>
            <div style="font-weight:600;margin-bottom:4px">Order #${d._id?.slice(-6)} — ${d.talent?.title||'—'}</div>
            <div style="font-size:.8rem;color:var(--t3)">Raised ${timeAgo(d.escrow?.dispute?.raisedAt)} by ${d.escrow?.dispute?.raisedBy?.name||'Unknown'}</div>
          </div>
          ${statusBadge(d.escrow?.status||'disputed')}
        </div>
        <div style="background:var(--bg-ele);border-radius:var(--r);padding:12px;margin-bottom:14px;font-size:.85rem;color:var(--t2)">
          <strong style="color:var(--warn)">📋 Reason:</strong> ${d.escrow?.dispute?.reason||'No reason provided'}
        </div>
        <div style="display:flex;gap:8px;align-items:center;font-size:.82rem;color:var(--t3);margin-bottom:14px">
          <span>Client: <strong style="color:var(--t1)">${d.client?.name||'—'}</strong></span>
          <span>•</span>
          <span>Freelancer: <strong style="color:var(--t1)">${d.freelancer?.name||'—'}</strong></span>
          <span>•</span>
          <span style="color:var(--accent)">Amount: $${fmt(d.price)}</span>
        </div>
        ${d.escrow?.status==='disputed'?`
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-success btn-sm" onclick="resolveDispute('${d._id}','freelancer')">🏆 Freelancer Wins</button>
          <button class="btn btn-p btn-sm" onclick="resolveDispute('${d._id}','client')">🏆 Client Wins</button>
          <button class="btn btn-g btn-sm" onclick="resolveDispute('${d._id}','split')">⚖️ Split 50/50</button>
        </div>`:`<div style="color:var(--success);font-size:.82rem">✅ Resolved — Winner: ${d.escrow?.dispute?.winner||'—'}</div>`}
      </div>`).join('')}
  </div>`;
}

window.resolveDispute = function(orderId, winner) {
  const winners = {freelancer:'Freelancer',client:'Client',split:'Split 50/50'};
  showModal('Resolve Dispute',`
    <div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:var(--r);padding:12px;margin-bottom:16px;font-size:.87rem;color:var(--warn)">
      ⚖️ Decision: <strong>${winners[winner]}</strong>
    </div>
    <div class="fg"><label>Resolution Note</label><textarea id="res-note" placeholder="Explain your decision..."></textarea></div>`, async()=>{
    const resolution = document.getElementById('res-note').value;
    if(!resolution.trim()){toast('Please provide a resolution note','warning');return;}
    const r = await API.post(`/escrow/${orderId}/resolve`, {winner, resolution});
    toast(r.success?`Dispute resolved — ${winners[winner]} wins ✅`:r.message, r.success?'success':'error');
    if(r.success) renderDisputes();
  });
};

window.adminRefund = function(orderId) {
  showModal('Issue Refund','<p style="color:var(--t2)">Refund this order to the client? Funds will be returned to their wallet.</p>',async()=>{
    const r = await API.post(`/escrow/${orderId}/refund`, {});
    toast(r.success?'Refund issued ↩️':r.message, r.success?'success':'error');
    if(r.success) renderOrders();
  });
};

// ─── BROADCAST ──────────────────────────────────────────────────
async function renderBroadcast() {
  document.getElementById('main-content').innerHTML = `
  <div style="max-width:600px">
    <div class="table-wrap" style="padding:28px">
      <h4 style="margin-bottom:20px">📢 Send Platform Broadcast</h4>
      <div class="fg"><label>Target Audience</label>
        <select id="bc-target">
          <option value="all">All Users</option>
          <option value="freelancer">Freelancers Only</option>
          <option value="client">Clients Only</option>
        </select>
      </div>
      <div class="fg"><label>Notification Title</label><input id="bc-title" placeholder="Platform Update"></div>
      <div class="fg"><label>Message</label><textarea id="bc-msg" placeholder="Write your message here..." style="min-height:120px"></textarea></div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-g" onclick="previewBroadcast()">👁 Preview</button>
        <button class="btn btn-admin" onclick="sendBroadcast()">📢 Send to All</button>
      </div>
    </div>
    <div class="table-wrap" style="padding:20px" id="bc-preview" style="display:none">
      <h4 style="margin-bottom:14px">Preview</h4>
      <div id="bc-preview-content"></div>
    </div>
  </div>`;
}

window.previewBroadcast = function() {
  const title = document.getElementById('bc-title').value||'No title';
  const msg = document.getElementById('bc-msg').value||'No message';
  const target = document.getElementById('bc-target').value;
  document.getElementById('bc-preview').style.display='block';
  document.getElementById('bc-preview-content').innerHTML = `
    <div style="background:rgba(108,71,255,.08);border:1px solid rgba(108,71,255,.2);border-radius:var(--r);padding:16px">
      <div style="font-weight:600;margin-bottom:6px">🔔 ${title}</div>
      <div style="font-size:.87rem;color:var(--t2)">${msg}</div>
      <div style="font-size:.75rem;color:var(--t3);margin-top:8px">Target: ${target} • ${fmtDate(new Date())}</div>
    </div>`;
};

window.sendBroadcast = async function() {
  const title = document.getElementById('bc-title').value;
  const message = document.getElementById('bc-msg').value;
  const target = document.getElementById('bc-target').value;
  if(!title||!message){toast('Fill title and message','warning');return;}
  const r = await API.post('/admin/broadcast', {title, message, target});
  toast(r.success?'Broadcast sent! 📢':r.message||'Broadcast sent!', 'success');
};

// ─── INIT ────────────────────────────────────────────────────────
showPage('overview');

// load dispute badge
API.get('/admin/disputes').then(r=>{
  const open = (r.data||[]).filter(d=>d.escrow?.status==='disputed').length;
  if(open>0){document.getElementById('badge-disputes').textContent=open;document.getElementById('badge-disputes').style.display='';}
});
</script>
