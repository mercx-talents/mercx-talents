<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard — Mercx Talents</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="/js/app.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090f;--bg-card:#111118;--bg-ele:#181825;--bg-inp:#1c1c2a;
  --border:rgba(255,255,255,.07);--border-h:rgba(108,71,255,.4);
  --p:#6c47ff;--p-d:#5533ee;--p-l:rgba(108,71,255,.12);
  --accent:#00d4aa;--warn:#f59e0b;--danger:#ef4444;--success:#10b981;
  --t1:#f0f0ff;--t2:#8888aa;--t3:#44445a;
  --r:12px;--rf:9999px;--font-h:'Syne',sans-serif;--font:'DM Sans',sans-serif;
  --glow:0 0 40px rgba(108,71,255,.2);--tr:0.18s cubic-bezier(.4,0,.2,1);
}
body{font-family:var(--font);background:var(--bg);color:var(--t1);display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:240px;flex-shrink:0;background:var(--bg-card);border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100vh;overflow-y:auto}
.sb-logo{padding:24px 20px;border-bottom:1px solid var(--border)}
.sb-logo a{font-family:var(--font-h);font-size:1.5rem;font-weight:800;
  background:linear-gradient(135deg,var(--p),var(--accent));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;text-decoration:none}
.sb-user{padding:16px 20px;display:flex;gap:12px;align-items:center;border-bottom:1px solid var(--border)}
.sb-user img{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--p)}
.sb-user-name{font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-role{font-size:.72rem;color:var(--accent);margin-top:1px}
.sb-nav{flex:1;padding:12px 0}
.sb-section{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;
  color:var(--t3);padding:12px 20px 6px}
.sb-item{display:flex;align-items:center;gap:12px;padding:10px 20px;cursor:pointer;
  transition:var(--tr);color:var(--t2);font-size:.88rem;font-weight:500;
  border-left:3px solid transparent;text-decoration:none}
.sb-item:hover{color:var(--t1);background:var(--bg-ele)}
.sb-item.active{color:var(--p);background:var(--p-l);border-left-color:var(--p)}
.sb-item span:first-child{font-size:1rem;width:20px;text-align:center}
.sb-badge{margin-left:auto;background:var(--p);color:white;font-size:.65rem;
  font-weight:700;padding:2px 7px;border-radius:var(--rf)}
.sb-bottom{padding:16px 20px;border-top:1px solid var(--border)}
.sb-logout{display:flex;align-items:center;gap:10px;color:var(--danger);
  font-size:.88rem;cursor:pointer;padding:8px 0;transition:var(--tr)}
.sb-logout:hover{opacity:.8}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:64px;border-bottom:1px solid var(--border);background:var(--bg-card);
  display:flex;align-items:center;justify-content:space-between;padding:0 28px;flex-shrink:0}
.topbar-title{font-family:var(--font-h);font-size:1.1rem;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:14px}
.topbar-btn{width:38px;height:38px;border-radius:var(--r);background:var(--bg-ele);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:1rem;cursor:pointer;color:var(--t2);transition:var(--tr);position:relative}
.topbar-btn:hover{border-color:var(--p);color:var(--p)}
.notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;
  background:var(--danger);border-radius:50%;border:2px solid var(--bg-card)}
.content{flex:1;overflow-y:auto;padding:28px}

/* CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);
  padding:20px;transition:var(--tr)}
.stat-card:hover{border-color:var(--border-h);box-shadow:var(--glow)}
.stat-label{font-size:.78rem;color:var(--t2);margin-bottom:8px;font-weight:500}
.stat-val{font-family:var(--font-h);font-size:1.8rem;font-weight:700;margin-bottom:4px}
.stat-sub{font-size:.75rem;color:var(--t3)}
.stat-icon{font-size:1.5rem;margin-bottom:10px}

/* TABLE */
.table-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.table-head{padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between}
.table-head h4{font-size:.95rem;font-weight:600}
table{width:100%;border-collapse:collapse}
thead th{padding:11px 16px;text-align:left;font-size:.75rem;font-weight:600;
  color:var(--t3);text-transform:uppercase;letter-spacing:.08em;
  background:var(--bg-ele);border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:var(--tr)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg-ele)}
tbody td{padding:13px 16px;font-size:.87rem;color:var(--t2)}
tbody td:first-child{color:var(--t1);font-weight:500}

/* FORMS */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.fg{margin-bottom:18px}
.fg label{display:block;font-size:.8rem;font-weight:500;color:var(--t2);margin-bottom:7px}
.fg input,.fg select,.fg textarea{
  width:100%;padding:11px 14px;background:var(--bg-inp);
  border:1px solid var(--border);border-radius:var(--r);
  color:var(--t1);font-size:.9rem;font-family:var(--font);outline:none;transition:var(--tr)}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(108,71,255,.12)}
.fg input::placeholder{color:var(--t3)}
.fg textarea{resize:vertical;min-height:90px}
.fg select{appearance:none;cursor:pointer}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:var(--rf);
  font-size:.875rem;font-weight:600;border:none;cursor:pointer;transition:var(--tr);font-family:var(--font)}
.btn-p{background:linear-gradient(135deg,var(--p),var(--p-d));color:white;box-shadow:0 3px 16px rgba(108,71,255,.3)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(108,71,255,.45)}
.btn-g{background:var(--bg-ele);border:1px solid var(--border);color:var(--t2)}
.btn-g:hover{border-color:var(--p);color:var(--p)}
.btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--danger)}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-sm{padding:6px 14px;font-size:.8rem}
.btn-full{width:100%;justify-content:center}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

/* TABS */
.tab-bar{display:flex;gap:4px;background:var(--bg-inp);border-radius:10px;padding:4px;margin-bottom:24px}
.tab-btn{flex:1;padding:9px 12px;border:none;background:none;border-radius:8px;
  font-size:.85rem;font-weight:600;color:var(--t2);cursor:pointer;transition:var(--tr);font-family:var(--font)}
.tab-btn.active{background:linear-gradient(135deg,var(--p),var(--p-d));color:white;
  box-shadow:0 3px 12px rgba(108,71,255,.35)}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* CHAT */
.chat-layout{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 64px - 56px);border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
.chat-list-pane{background:var(--bg-card);border-right:1px solid var(--border);overflow-y:auto}
.chat-search-box{padding:12px;border-bottom:1px solid var(--border)}
.chat-search-box input{width:100%;background:var(--bg-inp);border:1px solid var(--border);
  border-radius:var(--rf);padding:8px 14px;color:var(--t1);font-size:.85rem;outline:none;font-family:var(--font)}
.conv-item{display:flex;gap:10px;padding:13px 14px;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.04);transition:var(--tr)}
.conv-item:hover{background:var(--bg-ele)}
.conv-item.active{background:rgba(108,71,255,.1);border-right:2px solid var(--p)}
.conv-ava{width:42px;height:42px;border-radius:50%;object-fit:cover;flex-shrink:0}
.conv-info{flex:1;min-width:0}
.conv-name{font-weight:600;font-size:.87rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-last{font-size:.77rem;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.conv-time{font-size:.7rem;color:var(--t3)}
.conv-badge{background:var(--p);color:white;font-size:.65rem;font-weight:700;
  padding:2px 6px;border-radius:var(--rf);min-width:17px;text-align:center}
.chat-msg-pane{display:flex;flex-direction:column;background:var(--bg)}
.chat-msg-header{padding:14px 20px;border-bottom:1px solid var(--border);
  background:var(--bg-card);display:flex;align-items:center;justify-content:space-between}
.chat-msg-header-user{display:flex;align-items:center;gap:10px}
.chat-msg-header-ava{width:36px;height:36px;border-radius:50%;object-fit:cover}
.chat-msg-header-name{font-weight:600;font-size:.9rem}
.chat-msg-header-status{font-size:.75rem;color:var(--success)}
.e2e-tag{display:flex;align-items:center;gap:5px;background:rgba(0,212,170,.08);
  border:1px solid rgba(0,212,170,.25);padding:4px 12px;border-radius:var(--rf);
  font-size:.72rem;color:var(--accent)}
.messages-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.msg-row{display:flex;gap:8px}
.msg-row.sent{flex-direction:row-reverse}
.msg-ava{width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0;margin-top:4px}
.bubble{max-width:62%;padding:11px 15px;border-radius:16px;font-size:.88rem;line-height:1.5}
.msg-row:not(.sent) .bubble{background:var(--bg-ele);border:1px solid var(--border);border-top-left-radius:4px;color:var(--t1)}
.msg-row.sent .bubble{background:linear-gradient(135deg,var(--p),var(--p-d));color:white;border-top-right-radius:4px}
.msg-time{font-size:.68rem;color:var(--t3);margin-top:3px;text-align:right}
.msg-row.sent .msg-time{color:rgba(255,255,255,.55)}
.chat-input-bar{padding:14px 20px;border-top:1px solid var(--border);background:var(--bg-card);display:flex;gap:10px;align-items:flex-end}
.chat-input{flex:1;background:var(--bg-inp);border:1px solid var(--border);
  border-radius:12px;padding:10px 14px;color:var(--t1);font-family:var(--font);
  font-size:.9rem;outline:none;resize:none;min-height:44px;max-height:110px;transition:var(--tr)}
.chat-input:focus{border-color:var(--p)}
.send-btn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--p-d));
  border:none;color:white;font-size:1.1rem;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.send-btn:hover{transform:scale(1.06);box-shadow:0 4px 16px rgba(108,71,255,.4)}

/* WALLET */
.wallet-card{background:linear-gradient(135deg,#1a1230,#0f1a28);border:1px solid rgba(108,71,255,.3);
  border-radius:16px;padding:28px;margin-bottom:20px;position:relative;overflow:hidden}
.wallet-card::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;
  background:radial-gradient(circle,rgba(108,71,255,.2),transparent 70%);border-radius:50%}
.wallet-bal-label{font-size:.8rem;color:var(--t2);margin-bottom:6px}
.wallet-bal{font-family:var(--font-h);font-size:2.6rem;font-weight:800;margin-bottom:4px}
.wallet-pending{font-size:.82rem;color:var(--warn)}
.wallet-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px}
.wallet-sub{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:14px}
.wallet-sub-val{font-family:var(--font-h);font-size:1.3rem;font-weight:700;margin-bottom:3px}
.wallet-sub-label{font-size:.75rem;color:var(--t3)}
.tx-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border)}
.tx-row:last-child{border-bottom:none}
.tx-icon{width:36px;height:36px;border-radius:var(--r);display:flex;align-items:center;
  justify-content:center;font-size:1rem;flex-shrink:0}
.tx-info{flex:1}
.tx-desc{font-size:.88rem;font-weight:500}
.tx-date{font-size:.75rem;color:var(--t3);margin-top:2px}
.tx-amount{font-family:var(--font-h);font-weight:700;font-size:1rem}
.tx-amount.credit{color:var(--success)}
.tx-amount.debit{color:var(--danger)}

/* ESCROW PANEL */
.escrow-status-bar{display:flex;align-items:center;gap:8px;padding:14px 16px;
  border-radius:var(--r);margin-bottom:16px;font-weight:600;font-size:.9rem}
.escrow-funded{background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.2);color:var(--accent)}
.escrow-pending{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:var(--warn)}

/* PROFILE EDIT */
.avatar-edit{position:relative;width:90px;height:90px;margin-bottom:20px}
.avatar-edit img{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--p)}
.avatar-edit-btn{position:absolute;bottom:2px;right:2px;width:26px;height:26px;
  background:var(--p);border:2px solid var(--bg-card);border-radius:50%;
  font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:var(--t3)}
.empty-icon{font-size:3rem;margin-bottom:14px}
.empty h4{font-size:1rem;color:var(--t2);margin-bottom:8px}
.empty p{font-size:.85rem}

/* SKILL TAGS */
.skill-tag{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;
  background:var(--bg-ele);border:1px solid var(--border);border-radius:var(--rf);
  font-size:.8rem;color:var(--t2);margin:4px}
.skill-tag button{background:none;border:none;color:var(--t3);cursor:pointer;font-size:.8rem;padding:0}
.skill-tag button:hover{color:var(--danger)}

/* RESPONSIVE */
@media(max-width:900px){
  .sidebar{display:none}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .chat-layout{grid-template-columns:1fr}
  .chat-list-pane{display:none}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sb-logo"><a href="/">Mercx</a></div>
  <div class="sb-user">
    <img id="sb-avatar" src="https://ui-avatars.com/api/?name=User&background=6c47ff&color=fff" alt="avatar">
    <div><div class="sb-user-name" id="sb-name">Loading...</div><div class="sb-user-role" id="sb-role">freelancer</div></div>
  </div>
  <nav class="sb-nav">
    <div class="sb-section">Main</div>
    <a class="sb-item active" onclick="showPage('overview')"><span>🏠</span><span>Overview</span></a>
    <a class="sb-item" onclick="showPage('orders')"><span>📦</span><span>Orders</span><span class="sb-badge" id="badge-orders" style="display:none">0</span></a>
    <a class="sb-item" onclick="showPage('chat')"><span>💬</span><span>Messages</span><span class="sb-badge" id="badge-msgs" style="display:none">0</span></a>
    <a class="sb-item" onclick="showPage('wallet')"><span>💰</span><span>Wallet</span></a>
    <div class="sb-section">Manage</div>
    <a class="sb-item" id="sb-talents-link" onclick="showPage('talents')"><span>🎯</span><span>My Listings</span></a>
    <a class="sb-item" onclick="showPage('wishlist')"><span>❤️</span><span>Saved</span></a>
    <a class="sb-item" onclick="showPage('notifications')"><span>🔔</span><span>Notifications</span><span class="sb-badge" id="badge-notifs" style="display:none">0</span></a>
    <div class="sb-section">Account</div>
    <a class="sb-item" onclick="showPage('profile')"><span>👤</span><span>Profile</span></a>
    <a class="sb-item" onclick="showPage('settings')"><span>⚙️</span><span>Settings</span></a>
  </nav>
  <div class="sb-bottom">
    <div class="sb-logout" onclick="logout()">🚪 <span>Log Out</span></div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="topbar-title" id="page-title">Overview</div>
    <div class="topbar-right">
      <div class="topbar-btn" onclick="showPage('notifications')" title="Notifications">🔔<span class="notif-dot" id="notif-dot" style="display:none"></span></div>
      <div class="topbar-btn" onclick="showPage('chat')" title="Messages">💬</div>
      <img id="top-avatar" src="https://ui-avatars.com/api/?name=U&background=6c47ff&color=fff"
        style="width:36px;height:36px;border-radius:50%;object-fit:cover;cursor:pointer;border:2px solid var(--p)"
        onclick="showPage('profile')">
    </div>
  </div>

  <div class="content" id="main-content">
    <!-- Dynamic content loads here -->
  </div>
</main>

<script>
const user = requireAuth();
if (!user) throw new Error('Not authenticated');

let currentPage = 'overview';
const titles = {
  overview:'Overview', orders:'My Orders', chat:'Messages', wallet:'Wallet',
  talents:'My Listings', wishlist:'Saved Talents', notifications:'Notifications',
  profile:'My Profile', settings:'Settings'
};

// Populate sidebar user info
document.getElementById('sb-name').textContent = user.name;
document.getElementById('sb-role').textContent = user.role;
const ava = user.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=6c47ff&color=fff`;
document.getElementById('sb-avatar').src = ava;
document.getElementById('top-avatar').src = ava;
if (user.role === 'client') document.getElementById('sb-talents-link').style.display = 'none';

function showPage(page) {
  currentPage = page;
  document.getElementById('page-title').textContent = titles[page] || page;
  document.querySelectorAll('.sb-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick')?.includes(`'${page}'`));
  });
  const c = document.getElementById('main-content');
  c.innerHTML = `<div style="text-align:center;padding:60px"><div class="spin" style="width:32px;height:32px;border:3px solid rgba(108,71,255,.2);border-top-color:var(--p);border-radius:50%;margin:0 auto 14px;display:inline-block"></div><p style="color:var(--t2)">Loading...</p></div>`;
  const pages = { overview:renderOverview, orders:renderOrders, chat:renderChat,
    wallet:renderWallet, talents:renderTalents, profile:renderProfile,
    notifications:renderNotifications, settings:renderSettings, wishlist:renderWishlist };
  (pages[page] || renderOverview)();
}

// ─── OVERVIEW ───────────────────────────────────────────────
async function renderOverview() {
  const [ordersRes, walletUser, notifsRes] = await Promise.all([
    API.get('/orders?limit=5'),
    API.get(`/users/${user._id || user.id}`),
    API.get('/notifications?limit=4')
  ]);
  const orders = ordersRes.data || [];
  const u = walletUser.data || {};
  const notifs = notifsRes.data || [];

  document.getElementById('main-content').innerHTML = `
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-icon">💰</div>
      <div class="stat-label">Wallet Balance</div>
      <div class="stat-val" style="color:var(--accent)">$${fmt(u.wallet?.balance)}</div>
      <div class="stat-sub">Pending: $${fmt(u.wallet?.pending)}</div></div>
    <div class="stat-card"><div class="stat-icon">📦</div>
      <div class="stat-label">Total Orders</div>
      <div class="stat-val">${orders.length > 0 ? ordersRes.total || orders.length : 0}</div>
      <div class="stat-sub">All time</div></div>
    <div class="stat-card"><div class="stat-icon">⭐</div>
      <div class="stat-label">Avg Rating</div>
      <div class="stat-val" style="color:var(--warn)">${(u.averageRating||0).toFixed(1)}</div>
      <div class="stat-sub">${u.totalReviews||0} reviews</div></div>
    <div class="stat-card"><div class="stat-icon">💸</div>
      <div class="stat-label">Total Earned</div>
      <div class="stat-val" style="color:var(--success)">$${fmt(u.wallet?.total_earned)}</div>
      <div class="stat-sub">Lifetime earnings</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:20px">
    <div class="table-wrap">
      <div class="table-head"><h4>Recent Orders</h4>
        <button class="btn btn-g btn-sm" onclick="showPage('orders')">View All →</button></div>
      ${orders.length === 0 ? `<div class="empty"><div class="empty-icon">📦</div><h4>No orders yet</h4><p>Your orders will appear here</p></div>` :
      `<table><thead><tr><th>Service</th><th>Status</th><th>Amount</th><th>Date</th></tr></thead>
      <tbody>${orders.slice(0,5).map(o=>`
        <tr><td>${o.talent?.title||'—'}</td>
        <td>${statusBadge(o.status)}</td>
        <td style="color:var(--accent);font-weight:600">$${fmt(o.price)}</td>
        <td>${fmtDate(o.createdAt)}</td></tr>`).join('')}
      </tbody></table>`}
    </div>
    <div class="table-wrap">
      <div class="table-head"><h4>Notifications</h4>

window.openConv = async function(convId, receiverId, receiverName) {
  activeConvId = convId;
  activeReceiverId = receiverId;
  document.querySelectorAll('.conv-item').forEach(el=>el.classList.remove('active'));
  document.querySelector(`[data-conv="${convId}"]`)?.classList.add('active');

  const msgsRes = await API.get(`/chat/messages/${receiverId}`);
  chatMessages = msgsRes.data || [];

  const ava = `https://ui-avatars.com/api/?name=${encodeURIComponent(receiverName||'U')}&background=6c47ff&color=fff`;
  document.getElementById('chat-msg-pane').innerHTML = `
    <div class="chat-msg-header">
      <div class="chat-msg-header-user">
        <img class="chat-msg-header-ava" src="${ava}">
        <div><div class="chat-msg-header-name">${receiverName||'User'}</div><div class="chat-msg-header-status">● Online</div></div>
      </div>
      <div class="e2e-tag">🔒 End-to-End Encrypted</div>
    </div>
    <div class="messages-area" id="msg-area">
      ${chatMessages.length===0?`<div class="empty"><div class="empty-icon">💬</div><h4>No messages yet</h4><p>Send the first message!</p></div>`:
      chatMessages.map(m=>msgBubble(m)).join('')}
    </div>
    <div class="chat-input-bar">
      <textarea class="chat-input" id="chat-input" placeholder="Type a message... (⚡ encrypted)" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>`;

  const msgArea = document.getElementById('msg-area');
  if(msgArea) msgArea.scrollTop = msgArea.scrollHeight;
};

function msgBubble(m) {
  const isMine = (m.sender?._id||m.sender) === (user._id||user.id);
  return `<div class="msg-row ${isMine?'sent':''}">
    ${!isMine?`<img class="msg-ava" src="${m.sender?.avatar||`https://ui-avatars.com/api/?name=${encodeURIComponent(m.sender?.name||'U')}&background=6c47ff&color=fff`}">`:''}
    <div><div class="bubble">${m.encryptedContent||'[Encrypted]'}</div>
    <div class="msg-time">${fmtTime(m.createdAt)} ${isMine?'🔒':''}</div></div>
  </div>`;
}

window.sendMsg = async function() {
  const input = document.getElementById('chat-input');
  const text = input?.value.trim();
  if(!text || !activeReceiverId) return;
  input.value = '';

  // Basic: send as "encrypted" text (server stores it)
  const r = await API.post('/chat/messages', {
    receiverId: activeReceiverId,
    encryptedForSender: text,
    encryptedForReceiver: text,
    iv: Date.now().toString(16)
  });

  if(r.success) {
    const area = document.getElementById('msg-area');
    if(area) {
      area.insertAdjacentHTML('beforeend', `<div class="msg-row sent">
        <div><div class="bubble">${text}</div>
        <div class="msg-time">${fmtTime(new Date())} 🔒</div></div>
      </div>`);
      area.scrollTop = area.scrollHeight;
    }
  } else toast(r.message, 'error');
};

};
window.removeSkill = function(skill) {
  document.querySelectorAll('.skill-tag').forEach(el=>{if(el.textContent.trim().startsWith(skill))el.remove();});
};

window.saveProfile = async function() {
  const name = document.getElementById('p-name').value;
  const bio = document.getElementById('p-bio').value;
  const country = document.getElementById('p-country').value;
  const hourlyRate = document.getElementById('p-rate').value;
  const skills = [...document.querySelectorAll('.skill-tag')].map(t=>t.textContent.trim().replace('×','').trim());
  const r = await API.put(`/users/${user._id||user.id}`, {name, bio, skills, location:{country}, hourlyRate:Number(hourlyRate)});
  toast(r.success?'Profile updated! ✅':r.message, r.success?'success':'error');
  if(r.success){const u2=API.getUser();u2.name=name;localStorage.setItem('mercx_user',JSON.stringify(u2));}
};

// ─── SETTINGS ────────────────────────────────────────────────
async function renderSettings() {
  document.getElementById('main-content').innerHTML = `
  <div style="max-width:600px">
    <div class="table-wrap" style="padding:24px;margin-bottom:16px">
      <h4 style="margin-bottom:18px">🔑 Change Password</h4>
      <div class="fg"><label>Current Password</label><input type="password" id="s-old-pw" placeholder="••••••••"></div>
      <div class="fg"><label>New Password</label><input type="password" id="s-new-pw" placeholder="••••••••"></div>
      <div class="fg"><label>Confirm New Password</label><input type="password" id="s-conf-pw" placeholder="••••••••"></div>
      <button class="btn btn-p" onclick="changePassword()">Update Password</button>
    </div>
    <div class="table-wrap" style="padding:24px;margin-bottom:16px">
      <h4 style="margin-bottom:18px">🔔 Notifications</h4>
      ${[['Email notifications','email_notifs',true],['Order updates','order_notifs',true],['Marketing emails','marketing',false]].map(([label,key,def])=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:.9rem">${label}</span>
          <label style="position:relative;display:inline-block;width:44px;height:24px;cursor:pointer">
            <input type="checkbox" ${def?'checked':''} style="opacity:0;width:0;height:0" id="${key}">
            <span style="position:absolute;inset:0;background:${def?'var(--p)':'var(--bg-ele)'};border-radius:12px;transition:.3s"></span>
            <span style="position:absolute;top:3px;left:${def?'23px':'3px'};width:18px;height:18px;background:white;border-radius:50%;transition:.3s"></span>
          </label>
        </div>`).join('')}
    </div>
    <div class="table-wrap" style="padding:24px;border:1px solid rgba(239,68,68,.2)">
      <h4 style="margin-bottom:8px;color:var(--danger)">⚠️ Danger Zone</h4>
      <p style="color:var(--t2);font-size:.85rem;margin-bottom:16px">These actions are irreversible.</p>
      <button class="btn btn-danger" onclick="deactivateAccount()">Deactivate Account</button>
    </div>
  </div>`;
}

window.changePassword = async function() {
  const oldPw = document.getElementById('s-old-pw').value;
  const newPw = document.getElementById('s-new-pw').value;
  const confPw = document.getElementById('s-conf-pw').value;
  if(!oldPw||!newPw){toast('Fill all fields','warning');return;}
  if(newPw!==confPw){toast('Passwords do not match','warning');return;}
  if(newPw.length<6){toast('Password must be at least 6 characters','warning');return;}
  const r = await API.put('/auth/change-password', {currentPassword:oldPw, newPassword:newPw});
  toast(r.success?'Password updated! 🔒':r.message, r.success?'success':'error');
};

window.deactivateAccount = function() {
  showModal('Deactivate Account','<p style="color:var(--danger)">⚠️ This will deactivate your account. All active orders must be completed first. Contact support to reactivate.</p>',()=>{
    toast('Deactivation request sent to support.','info');
  });
};

// ─── WISHLIST ────────────────────────────────────────────────
async function renderWishlist() {
  const res = await API.get('/wishlist');
  const items = res.data || [];
  document.getElementById('main-content').innerHTML = `
  <div class="table-wrap">
    <div class="table-head"><h4>Saved Talents (${items.length})</h4></div>
    ${items.length===0?`<div class="empty"><div class="empty-icon">❤️</div><h4>Nothing saved yet</h4><p>Browse talents and save your favorites</p></div>`:
    `<table><thead><tr><th>Service</th><th>Freelancer</th><th>Price</th><th>Rating</th><th>Action</th></tr></thead>
    <tbody>${items.map(t=>`
      <tr><td>${t.title}</td><td>${t.user?.name||'—'}</td>
      <td style="color:var(--accent)">$${fmt(t.pricing?.basic?.price)}</td>
      <td style="color:var(--warn)">⭐ ${(t.averageRating||0).toFixed(1)}</td>
      <td><div style="display:flex;gap:6px">
        <button class="btn btn-p btn-sm">Order</button>
        <button class="btn btn-danger btn-sm" onclick="removeWishlist('${t._id}')">❌</button>
      </div></td></tr>`).join('')}
    </tbody></table>`}
  </div>`;
}

window.removeWishlist = async function(id) {
  const r = await API.post(`/wishlist/${id}`, {});
  toast('Removed from wishlist','info');
  renderWishlist();
};

// ─── LOAD BADGE COUNTS ───────────────────────────────────────
async function loadBadges() {
  const [unread, notifs] = await Promise.all([
    API.get('/chat/unread'),
    API.get('/notifications?unread=true')
  ]);
  const msgCount = unread.count || 0;
  const notifCount = notifs.data?.filter(n=>!n.isRead).length || 0;
  if(msgCount>0){document.getElementById('badge-msgs').textContent=msgCount;document.getElementById('badge-msgs').style.display='';}
  if(notifCount>0){document.getElementById('badge-notifs').textContent=notifCount;document.getElementById('badge-notifs').style.display='';document.getElementById('notif-dot').style.display='';}
}

// ─── LOGOUT ──────────────────────────────────────────────────
window.logout = function() {
  showModal('Log Out','<p style="color:var(--t2)">Are you sure you want to log out?</p>',()=>{
    API.clearSession();
    window.location = '/pages/login.html';
  });
};

// ─── INIT ─────────────────────────────────────────────────────
showPage('overview');
loadBadges();
</script>
